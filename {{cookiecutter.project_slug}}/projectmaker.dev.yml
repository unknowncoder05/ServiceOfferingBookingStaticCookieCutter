{% raw %}
version: "1"

# Development variant — bind-mounted source, hot-reload servers, cached deps.
# Used automatically when deployment.environment == 'development'.
#
# Key differences from projectmaker.yml:
#   - Source code is bind-mounted (.:/project) — no image rebuild for code changes
#   - Backend runs uvicorn --reload; frontend runs npm start with HMR
#   - Python packages cached in dev_python_venv volume (reinstalled only on requirements change)
#   - node_modules cached in dev_node_modules volume
#   - REACT_APP_* vars are runtime env (read by dev server at startup, not baked at build)
#   - Dev-friendly defaults: DJANGO_DEBUG=true, ENVIRONMENT=development

commands:
  migrate:
    label: "Run Migrations"
    description: "Apply any pending database migrations."
    run: "python manage.py migrate --noinput"
    service: backend

  setup_admin:
    label: "Setup Admin Account"
    description: "Create or update an administrative account non-interactively."
    run: "python manage.py shell -c \"from api.users.models import User; User.objects.filter(email='{email}').delete(); User.objects.create_superuser('{email}', '{password}')\""
    service: backend
    params:
      email:
        type: string
        label: "Email"
        required: true
      password:
        type: secret
        label: "Password"
        required: true


  test:
    label: "Run Tests"
    description: "Execute the full test suite."
    run: "python manage.py test --verbosity 2"
    service: backend

  test_e2e:
    label: "Run E2E Tests"
    description: "Run UI guardrails and Playwright end-to-end tests with screenshot capture."
    run: "npm install && npm run test:e2e:ci"
    service: playwright

sections:
  Security:
    order: 1
  Database:
    order: 2
  Application:
    order: 3
  Cache:
    order: 4
  Email:
    order: 5
  CORS:
    order: 6
  "GitHub OAuth":
    order: 7
  WhatsApp:
    order: 8
  Storage:
    order: 9
  Monitoring:
    order: 10
  "AI Integration":
    order: 11
  "Timeouts & Polling":
    order: 12
  Theme:
    order: 13

resources:
  storage:
    buckets:
      - key: media
        provider: s3
        access: public
        public_read: true
      - key: private_media
        provider: s3
        access: private
        public_read: false

services:

  # ────────────────────────────────────────────────────────────────────────────
  # Frontend — React dev server (npm start / react-scripts start)
  # REACT_APP_* vars are injected into process.env at server startup.
  # ────────────────────────────────────────────────────────────────────────────
  frontend:
    type: frontend
    cpu: 0.5
    memory: 512
    order: 2
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - pm_dev_frontend_node_modules:/app/node_modules
    port: 3000
    public: true
    route: /
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3000/ || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 90s
    env:

      # ── Application ──────────────────────────────────────────────────────
      REACT_APP_PROJECT_NAME:
          type: string
          section: Application
          default: "{{project_name}}"
      REACT_APP_API_URL:
        type: url
        label: "API Base URL"
        description: "Base URL of the backend REST API. In dev this hits the Traefik-proxied /api route."
        placeholder: "https://myapp.example.com/api/v1"
        section: Application
        required: false
        default: "{{backend.url}}/v1"

      REACT_APP_API_GATEWAY_START_ENDPOINT:
        type: url
        label: "API Gateway Wake Endpoint"
        description: "AWS API Gateway URL that wakes the backend from sleep. Leave blank to disable."
        section: Application
        required: false
        default: ""

      # ── Timeouts & Polling ────────────────────────────────────────────────
      REACT_APP_KEEP_ALIVE_INTERVAL:
        type: slider
        label: "Keep-Alive Interval (ms)"
        section: "Timeouts & Polling"
        required: false
        default: "300000"
        min: 60000
        max: 900000
        step: 60000

      REACT_APP_STARTUP_TIMEOUT:
        type: slider
        label: "Startup Timeout (ms)"
        section: "Timeouts & Polling"
        required: false
        default: "90000"
        min: 15000
        max: 300000
        step: 15000

      REACT_APP_HEALTH_CHECK_TIMEOUT:
        type: slider
        label: "Health Check Timeout (ms)"
        section: "Timeouts & Polling"
        required: false
        default: "5000"
        min: 1000
        max: 30000
        step: 1000

      REACT_APP_POLLING_INTERVAL:
        type: slider
        label: "Polling Interval (ms)"
        section: "Timeouts & Polling"
        required: false
        default: "2000"
        min: 500
        max: 10000
        step: 500

      REACT_APP_NAVIGATION_DELAY:
        type: slider
        label: "Navigation Delay (ms)"
        section: "Timeouts & Polling"
        required: false
        default: "1000"
        min: 0
        max: 5000
        step: 250

      CHOKIDAR_USEPOLLING:
        type: boolean
        label: "CHOKIDAR_USEPOLLING"
        description: "Enable polling-based file watching for hot-reload inside Docker. Required when the source is bind-mounted."
        section: Application
        required: false
        default: "true"

      # ── Theme ──────────────────────────────────────────────────────────────
      REACT_APP_PRIMARY_50:
        type: color
        label: "Primary 50"
        description: "Lightest primary tint — used for subtle backgrounds and hover states."
        section: Theme
        required: false
        default: "{{resources.theme.primary_50}}"

      REACT_APP_PRIMARY_100:
        type: color
        label: "Primary 100"
        description: "Very light primary tint."
        section: Theme
        required: false
        default: "{{resources.theme.primary_100}}"

      REACT_APP_PRIMARY_200:
        type: color
        label: "Primary 200"
        description: "Light primary tint."
        section: Theme
        required: false
        default: "{{resources.theme.primary_200}}"

      REACT_APP_PRIMARY_300:
        type: color
        label: "Primary 300"
        description: "Soft primary — used for borders and disabled states."
        section: Theme
        required: false
        default: "{{resources.theme.primary_300}}"

      REACT_APP_PRIMARY_400:
        type: color
        label: "Primary 400"
        description: "Mid-light primary — used for icons and secondary accents."
        section: Theme
        required: false
        default: "{{resources.theme.primary_400}}"

      REACT_APP_PRIMARY_500:
        type: color
        label: "Primary 500"
        description: "Base primary — used for highlights and active indicators."
        section: Theme
        required: false
        default: "{{resources.theme.primary_500}}"

      REACT_APP_PRIMARY_600:
        type: color
        label: "Primary 600"
        description: "Main brand color — used for buttons, links, and interactive elements."
        section: Theme
        required: false
        default: "{{resources.theme.primary_600}}"

      REACT_APP_PRIMARY_700:
        type: color
        label: "Primary 700"
        description: "Dark primary — used for hover and pressed states on buttons."
        section: Theme
        required: false
        default: "{{resources.theme.primary_700}}"

      REACT_APP_PRIMARY_800:
        type: color
        label: "Primary 800"
        description: "Very dark primary — used for deep shadows and text on light backgrounds."
        section: Theme
        required: false
        default: "{{resources.theme.primary_800}}"

      REACT_APP_PRIMARY_900:
        type: color
        label: "Primary 900"
        description: "Darkest primary shade — used for high-contrast text and deep accents."
        section: Theme
        required: false
        default: "{{resources.theme.primary_900}}"

  # ────────────────────────────────────────────────────────────────────────────
  # Backend — Django + uvicorn --reload (hot-reload on source change)
  # ────────────────────────────────────────────────────────────────────────────
        # ── Secondary Theme (Neutrals) ──────────────────────────────────────────
        REACT_APP_SECONDARY_50:
          type: color
          label: "Secondary 50"
          section: Theme
          required: false
          default: "{{resources.theme.secondary_50}}"

        REACT_APP_SECONDARY_100:
          type: color
          label: "Secondary 100"
          section: Theme
          required: false
          default: "{{resources.theme.secondary_100}}"

        REACT_APP_SECONDARY_200:
          type: color
          label: "Secondary 200"
          section: Theme
          required: false
          default: "{{resources.theme.secondary_200}}"

        REACT_APP_SECONDARY_300:
          type: color
          label: "Secondary 300"
          section: Theme
          required: false
          default: "{{resources.theme.secondary_300}}"

        REACT_APP_SECONDARY_400:
          type: color
          label: "Secondary 400"
          section: Theme
          required: false
          default: "{{resources.theme.secondary_400}}"

        REACT_APP_SECONDARY_500:
          type: color
          label: "Secondary 500"
          section: Theme
          required: false
          default: "{{resources.theme.secondary_500}}"

        REACT_APP_SECONDARY_600:
          type: color
          label: "Secondary 600"
          section: Theme
          required: false
          default: "{{resources.theme.secondary_600}}"

        REACT_APP_SECONDARY_700:
          type: color
          label: "Secondary 700"
          section: Theme
          required: false
          default: "{{resources.theme.secondary_700}}"

        REACT_APP_SECONDARY_800:
          type: color
          label: "Secondary 800"
          section: Theme
          required: false
          default: "{{resources.theme.secondary_800}}"

        REACT_APP_SECONDARY_900:
          type: color
          label: "Secondary 900"
          section: Theme
          required: false
          default: "{{resources.theme.secondary_900}}"
        # ── Functional Colors ──────────────────────────────────────────────────
        REACT_APP_SUCCESS_50:
          type: color
          section: Theme
          default: "{{resources.theme.success_50}}"
        REACT_APP_SUCCESS_500:
          type: color
          section: Theme
          default: "{{resources.theme.success_500}}"
        REACT_APP_SUCCESS_600:
          type: color
          section: Theme
          default: "{{resources.theme.success_600}}"

        REACT_APP_DANGER_50:
          type: color
          section: Theme
          default: "{{resources.theme.danger_50}}"
        REACT_APP_DANGER_500:
          type: color
          section: Theme
          default: "{{resources.theme.danger_500}}"
        REACT_APP_DANGER_600:
          type: color
          section: Theme
          default: "{{resources.theme.danger_600}}"

        REACT_APP_WARNING_50:
          type: color
          section: Theme
          default: "{{resources.theme.warning_50}}"
        REACT_APP_WARNING_500:
          type: color
          section: Theme
          default: "{{resources.theme.warning_500}}"
        REACT_APP_WARNING_600:
          type: color
          section: Theme
          default: "{{resources.theme.warning_600}}"

        REACT_APP_INFO_50:
          type: color
          section: Theme
          default: "{{resources.theme.info_50}}"
        REACT_APP_INFO_500:
          type: color
          section: Theme
          default: "{{resources.theme.info_500}}"
        REACT_APP_INFO_600:
          type: color
          section: Theme
          default: "{{resources.theme.info_600}}"
  playwright:
    type: internal
    cpu: 0.25
    memory: 512
    image: mcr.microsoft.com/playwright:v1.59.1-jammy
    command: sh -c "npm install && ./node_modules/.bin/playwright test"
    depends_on:
      - frontend
    volumes:
      - ./frontend:/app
      - playwright_node_modules:/app/node_modules
    env:
      REACT_APP_FRONTEND_URL:
        type: string
        label: "Playwright Frontend URL"
        description: "Internal frontend URL used by the Playwright verification service."
        section: Application
        required: false
        default: "http://frontend:3000"

  backend:
    type: backend
    cpu: 1
    memory: 1024
    order: 1
    build:
      context: ./BackEndApi
      dockerfile: compose/dev/django/Dockerfile
    port: 8000
    public: true
    route: /api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 300s
    env:

      # ── Application ────────────────────────────────────────────────────────
      DJANGO_SETTINGS_MODULE:
        type: select
        label: "Django Settings Module"
        section: Application
        required: false
        default: "config.settings.local"
        options:
          - "config.settings.production"
          - "config.settings.local"

      ENVIRONMENT:
        type: select
        label: "Environment"
        section: Application
        required: false
        default: "development"
        options:
          - "development"
          - "production"
          - "staging"
          - "local"

      DJANGO_DEBUG:
        type: boolean
        label: "Debug Mode"
        section: Application
        required: false
        default: "true"

      REQUIREMENTS_FILE:
        type: select
        label: "Requirements File"
        description: "pip requirements file installed at container startup from the named venv volume."
        section: Application
        required: false
        default: "local.txt"
        options:
          - "local.txt"
          - "production.txt"
          - "base.txt"

      # ── Security ───────────────────────────────────────────────────────────
      DJANGO_SECRET_KEY:
        type: secret
        label: "Django Secret Key"
        section: Security
        required: true
        generate: secret_key
        immutable: true
        order: 1
        default: ""

      DJANGO_ADMIN_URL:
        type: string
        label: "Admin URL Path"
        section: Security
        required: false
        default: "admin/"

      PASSWORD_RESET_METHOD:
        type: select
        label: "Password Reset Method"
        description: "How users receive password reset and account recovery tokens. 'console' is recommended for dev — tokens print to container logs."
        section: Security
        required: false
        default: "console"
        options:
          - "email"
          - "otp"
          - "console"

      PASSWORD_RESET_FRONTEND_URL:
        type: url
        label: "Password Reset Frontend URL"
        section: Security
        required: false
        default: "${DEPLOYMENT_URL}/reset-password"

      ACCOUNT_RECOVERY_FRONTEND_URL:
        type: url
        label: "Account Recovery Frontend URL"
        section: Security
        required: false
        default: "${DEPLOYMENT_URL}/recover-account"

      # ── Database ───────────────────────────────────────────────────────────
      POSTGRES_DB:
        type: string
        label: "Database Name"
        section: Database
        required: true
        order: 2
        default: "postgres"

      POSTGRES_USER:
        type: string
        label: "Database User"
        section: Database
        required: true
        order: 3
        default: "postgres"

      POSTGRES_PASSWORD:
        type: secret
        label: "Database Password"
        section: Database
        required: true
        generate: password
        immutable: true
        order: 1
        default: ""

      POSTGRES_HOST:
        type: string
        label: "Database Host"
        section: Database
        required: false
        default: "postgres"

      POSTGRES_PORT:
        type: number
        label: "Database Port"
        section: Database
        required: false
        default: "5432"
        min: 1
        max: 65535

      # ── Cache ──────────────────────────────────────────────────────────────
      REDIS_URL:
        type: string
        label: "Redis URL"
        section: Cache
        required: false
        default: "redis://redis:6379/0"

      REDIS_CHANNEL_LAYER_HOST:
        type: string
        label: "Redis Channel Layer Host"
        section: Cache
        required: false
        default: "redis"

      # ── CORS ───────────────────────────────────────────────────────────────
      CORS_ALLOWED_ORIGINS:
        type: string
        label: "CORS Allowed Origins"
        section: CORS
        required: false
        default: "*"

      # ── Email ──────────────────────────────────────────────────────────────
      DJANGO_EMAIL_BACKEND:
        type: select
        label: "Email Backend"
        section: Email
        required: false
        default: "django.core.mail.backends.console.EmailBackend"
        options:
          - "django.core.mail.backends.console.EmailBackend"
          - "django.core.mail.backends.smtp.EmailBackend"
          - "django.core.mail.backends.dummy.EmailBackend"

      EMAIL_NO_REPLY:
        type: string
        label: "No-Reply Email Address"
        section: Email
        required: false
        default: "info@app.com"

      # ── AI Integration ─────────────────────────────────────────────────────
      OPENAI_API_KEY:
        type: secret
        label: "OpenAI API Key"
        section: "AI Integration"
        required: false
        default: ""

      # ── GitHub OAuth ───────────────────────────────────────────────────────
      GITHUB_CLIENT_ID:
        type: string
        label: "GitHub OAuth Client ID"
        section: "GitHub OAuth"
        required: false
        default: ""

      GITHUB_CLIENT_SECRET:
        type: secret
        label: "GitHub OAuth Client Secret"
        section: "GitHub OAuth"
        required: false
        default: ""

      GITHUB_REDIRECT_URI:
        type: url
        label: "GitHub OAuth Redirect URI"
        section: "GitHub OAuth"
        required: false
        default: "${DEPLOYMENT_URL}/settings/github/callback"

      # ── WhatsApp ───────────────────────────────────────────────────────────
      WHATSAPP_AUTHORIZATION_TOKEN:
        type: secret
        label: "WhatsApp Authorization Token"
        section: WhatsApp
        required: false
        default: ""

      WHATSAPP_MESSAGE_URI:
        type: url
        label: "WhatsApp Messages API URI"
        section: WhatsApp
        required: false
        default: ""

      # ── Storage ────────────────────────────────────────────────────────────
      AWS_REGION_NAME:
        type: string
        label: "AWS Region"
        section: Storage
        required: false
        default: "us-east-1"

      AWS_ACCESS_KEY_ID:
        type: secret
        label: "AWS Access Key ID"
        section: Storage
        required: false
        default: ""

      AWS_SECRET_ACCESS_KEY:
        type: secret
        label: "AWS Secret Access Key"
        section: Storage
        required: false
        default: ""

      AWS_STORAGE_BUCKET_NAME:
        type: string
        label: "S3 Bucket Name"
        section: Storage
        required: false
        default: ""

      AWS_PRIVATE_STORAGE_BUCKET_NAME:
        type: string
        label: "Private S3 Bucket Name"
        section: Storage
        required: false
        default: ""

      # ── Monitoring ─────────────────────────────────────────────────────────
      SENTRY_DSN:
        type: secret
        label: "Sentry DSN"
        section: Monitoring
        required: false
        default: ""

  # ────────────────────────────────────────────────────────────────────────────
  # Celery Worker — async background tasks (hot-reload via watchfiles)
  # ────────────────────────────────────────────────────────────────────────────
  celery-worker:
    type: worker
    cpu: 0.5
    memory: 512
    order: 3
    build:
      context: ./BackEndApi
      dockerfile: compose/dev/django/Dockerfile
    healthcheck:
      test: ["CMD-SHELL", "celery -A config.celery inspect ping --timeout 5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    env:

      DJANGO_SETTINGS_MODULE:
        type: select
        label: "Django Settings Module"
        section: Application
        required: false
        default: "config.settings.production"
        options:
          - "config.settings.production"
          - "config.settings.local"

      ENVIRONMENT:
        type: select
        label: "Environment"
        section: Application
        required: false
        default: "development"
        options:
          - "development"
          - "production"
          - "staging"
          - "local"

      DJANGO_DEBUG:
        type: boolean
        label: "Debug Mode"
        section: Application
        required: false
        default: "true"

      REQUIREMENTS_FILE:
        type: select
        label: "Requirements File"
        description: "pip requirements file installed at container startup from the named venv volume."
        section: Application
        required: false
        default: "local.txt"
        options:
          - "local.txt"
          - "production.txt"
          - "base.txt"

      DJANGO_SECRET_KEY:
        type: secret
        label: "Django Secret Key"
        section: Security
        required: true
        generate: secret_key
        immutable: true
        order: 1
        default: ""

      POSTGRES_DB:
        type: string
        label: "Database Name"
        section: Database
        required: true
        order: 2
        default: "postgres"

      POSTGRES_USER:
        type: string
        label: "Database User"
        section: Database
        required: true
        order: 3
        default: "postgres"

      POSTGRES_PASSWORD:
        type: secret
        label: "Database Password"
        section: Database
        required: true
        generate: password
        immutable: true
        order: 1
        default: ""

      POSTGRES_HOST:
        type: string
        label: "Database Host"
        section: Database
        required: false
        default: "postgres"

      POSTGRES_PORT:
        type: number
        label: "Database Port"
        section: Database
        required: false
        default: "5432"
        min: 1
        max: 65535

      REDIS_URL:
        type: string
        label: "Redis URL"
        section: Cache
        required: false
        default: "redis://redis:6379/0"

      OPENAI_API_KEY:
        type: secret
        label: "OpenAI API Key"
        section: "AI Integration"
        required: false
        default: ""

  # ────────────────────────────────────────────────────────────────────────────
  # Celery Beat — periodic task scheduler
  # ────────────────────────────────────────────────────────────────────────────
  celery-beat:
    type: worker
    cpu: 0.5
    memory: 512
    order: 4
    build:
      context: ./BackEndApi
      dockerfile: compose/dev/django/Dockerfile
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s
    env:

      DJANGO_SETTINGS_MODULE:
        type: select
        label: "Django Settings Module"
        section: Application
        required: false
        default: "config.settings.production"
        options:
          - "config.settings.production"
          - "config.settings.local"

      ENVIRONMENT:
        type: select
        label: "Environment"
        section: Application
        required: false
        default: "development"
        options:
          - "development"
          - "production"
          - "staging"
          - "local"

      DJANGO_DEBUG:
        type: boolean
        label: "Debug Mode"
        section: Application
        required: false
        default: "true"

      REQUIREMENTS_FILE:
        type: select
        label: "Requirements File"
        description: "pip requirements file installed at container startup from the named venv volume."
        section: Application
        required: false
        default: "local.txt"
        options:
          - "local.txt"
          - "production.txt"
          - "base.txt"

      DJANGO_SECRET_KEY:
        type: secret
        label: "Django Secret Key"
        section: Security
        required: true
        generate: secret_key
        immutable: true
        order: 1
        default: ""

      POSTGRES_DB:
        type: string
        label: "Database Name"
        section: Database
        required: true
        order: 2
        default: "postgres"

      POSTGRES_USER:
        type: string
        label: "Database User"
        section: Database
        required: true
        order: 3
        default: "postgres"

      POSTGRES_PASSWORD:
        type: secret
        label: "Database Password"
        section: Database
        required: true
        generate: password
        immutable: true
        order: 1
        default: ""

      POSTGRES_HOST:
        type: string
        label: "Database Host"
        section: Database
        required: false
        default: "postgres"

      POSTGRES_PORT:
        type: number
        label: "Database Port"
        section: Database
        required: false
        default: "5432"
        min: 1
        max: 65535

      REDIS_URL:
        type: string
        label: "Redis URL"
        section: Cache
        required: false
        default: "redis://redis:6379/0"

  # ────────────────────────────────────────────────────────────────────────────
  # PostgreSQL — relational database (same as production)
  # ────────────────────────────────────────────────────────────────────────────
  postgres:
    type: internal
    cpu: 0.25
    memory: 512
    order: 5
    image: postgres:15-alpine
    env:

      POSTGRES_DB:
        type: string
        label: "Database Name"
        section: Database
        required: true
        order: 2
        default: "postgres"

      POSTGRES_USER:
        type: string
        label: "Database User"
        section: Database
        required: true
        order: 3
        default: "postgres"

      POSTGRES_PASSWORD:
        type: secret
        label: "Database Password"
        section: Database
        required: true
        generate: password
        immutable: true
        order: 1
        default: ""

      POSTGRES_HOST:
