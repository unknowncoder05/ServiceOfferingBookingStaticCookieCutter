version: '3'

services:
  redis:
    image: redis:6.2
    ports:
      - "6379:6379"

  django: &django
    build:
      context: ./
      dockerfile: ./compose/production/django/Dockerfile
    image: {{ cookiecutter.project_slug_dashed }}-backend-prod
    depends_on:
      - redis
    volumes:
      - ./api:/app
    env_file:
      - ./.envs/.prod/.cloud
      - ./.envs/.prod/.db
      - ./.envs/.prod/.django
    environment:
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    command: /start

  celeryworker:
    <<: *django
    image: {{ cookiecutter.project_slug_dashed }}-backend-prod
    depends_on:
      - redis
    ports: []
    command: /start-celeryworker

  celerybeat:
    <<: *django
    image: {{ cookiecutter.project_slug_dashed }}-backend-prod
    depends_on:
      - redis
    ports: []
    command: /start-celerybeat
