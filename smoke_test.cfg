# smoke_test.cfg — BaseEphemeralCookieCutter overrides for smoke_test.sh
# This file is sourced as bash before the test runs.

COMPOSE_FILE="docker-compose.dev.yml"
DJANGO_SERVICE="backend"
CELERY_SERVICE="celery-worker"
HEALTH_URL="http://localhost:3000/"  # Wait for frontend to be up

# Frontend compilation check — waits for CRA/Vite to finish compiling after code sync
FRONTEND_SERVICE="frontend"
FRONTEND_COMPILE_TIMEOUT=120

# Point at the smoke-test env overrides
EXTRA_ENV_OVERRIDES="smoke_test_envs/.django.override"
SYNC_PATHS="BackEndApi src frontend projectmaker.yml projectmaker.dev.yml docker-compose.dev.yml"
REBUILD_WATCH_PATHS="BackEndApi/requirements BackEndApi/compose/dev/django frontend/package.json frontend/Dockerfile.dev"

